<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 2</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    background: #fdf6f0;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px 70px;
    position: relative;
    overflow: hidden;
}

/* SOFT BACKGROUND BLOBS */
body::before {
    content: '';
    position: fixed; inset: 0;
    background:
        radial-gradient(ellipse at 10% 15%, rgba(255,182,193,0.35) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 85%, rgba(255,218,185,0.3) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%, rgba(255,240,245,0.4) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* CARD */
.container {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,182,193,0.3);
    border-radius: 24px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 2;
    box-shadow:
        0 8px 40px rgba(220,130,140,0.12),
        0 2px 8px rgba(220,130,140,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
    height: min(88vh, 680px);
}

/* TITLE */
.title {
    text-align: center;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(16px, 4vw, 20px);
    color: #c0687a;
    letter-spacing: 0.5px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(220,130,140,0.2);
    flex-shrink: 0;
}

/* TEXT AREA */
.content {
    flex: 1;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: none;
}
.content::-webkit-scrollbar { display: none; }

#typingText {
    font-size: clamp(14px, 3.2vw, 16px);
    line-height: 1.9;
    color: #5a3a3a;
    font-weight: 300;
}

/* CURSOR */
#typingText::after {
    content: "|";
    color: #e8899a;
    animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* DIVIDER */
.divider {
    height: 1px;
    background: rgba(220,130,140,0.15);
    flex-shrink: 0;
}

/* VIDEO AREA */
.video {
    flex-shrink: 0;
    height: 38%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    overflow: hidden;
    background: #f0d8dc;
    box-shadow: 0 4px 20px rgba(200,100,120,0.15);
}

.video video {
    height: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    border-radius: 14px;
    display: block;
}

/* OVERLAY */
#playOverlay {
    position: absolute; inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    background: rgba(255,240,242,0.2);
    border-radius: 16px;
    transition: opacity 0.3s ease;
}
#playOverlay.show {
    opacity: 1;
    pointer-events: auto;
}

/* PLAY BUTTON */
.play-btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,182,193,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    color: #c0687a;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
    box-shadow: 0 4px 16px rgba(200,100,120,0.2);
}
.play-btn:hover {
    background: rgba(255,255,255,0.85);
    transform: scale(1.08);
}

/* BACK BUTTON */
.back-btn {
    position: fixed;
    bottom: 18px; right: 18px;
    background: linear-gradient(135deg, #e8899a, #f0b080);
    padding: 11px 22px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(232,137,154,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.back-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(232,137,154,0.5);
}

/* FLOATING PETALS */
.petal {
    position: fixed;
    pointer-events: none;
    animation: petalDrift linear infinite;
    opacity: 0;
    z-index: 1;
    font-size: 14px;
}
@keyframes petalDrift {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <div class="title">To My Dearest Friend 💕</div>

    <div class="content" id="box">
        <p id="typingText"></p>
    </div>

    <div class="divider"></div>

    <div class="video">
        <video id="video" autoplay muted playsinline>
            <source src="../images/video.mp4" type="video/mp4">
        </video>
        <div id="playOverlay">
            <div class="play-btn">▶</div>
        </div>
    </div>
</div>

<a href="../envelopes.html" class="back-btn">BACK ◀</a>

<script>
const message = `I don't think I say this enough, but having you in my life is one of the greatest blessings I could ever ask for. You've seen me at my best and my worst, and yet you've never stopped being there for me. That kind of love and loyalty is rare, and I'm so grateful for you every single day.

You're not just my friend, you're my safe place, my biggest supporter, and one of the reasons I smile a little more and worry a little less. You're always in my prayers, and I pray that life blesses you with happiness, good health, strength, and everything your heart desires.

No matter where life takes us, I promise I'll always be right here, cheering you on and standing by your side just like you've always done for me.

And years from now, when you're the cool aunt to my kids and I'm the chocolate uncle to yours, I hope we'll still be sharing the same bond, making each other laugh, and showing up for one another the way we always have.

Take your "sister responsibilities" seriously because I'll always need you in my life, now and forever 🤍.

Have the most beautiful birthday di, you truly deserve it ✨`;

let i = 0;
const text = document.getElementById("typingText");
const box  = document.getElementById("box");

function type() {
    if (i < message.length) {
        const char = message[i];
        text.innerHTML += (char === "\n") ? "<br>" : char;
        i++;
        box.scrollTop = box.scrollHeight;

        let delay = Math.random() * 60 + 40;
        if (char === ".")       delay = 400;
        else if (char === ",")  delay = 200;
        else if (char === "!" || char === "?") delay = 500;
        else if (char === "\n") delay = 600;

        setTimeout(type, delay);
    }
}

/* VIDEO */
const video   = document.getElementById("video");
const overlay = document.getElementById("playOverlay");

video.onended = () => overlay.classList.add("show");
overlay.onclick = () => {
    video.currentTime = 0;
    video.play();
    overlay.classList.remove("show");
};

let typingStarted = false;
video.addEventListener("timeupdate", () => {
    if (video.currentTime >= 13 && !typingStarted) {
        typingStarted = true;
        type();
    }
});

/* FLOATING PETALS */
const petals = ['🌸','✿','❀','🌷'];
function spawnPetal() {
    const p = document.createElement("div");
    p.className = "petal";
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.cssText = `
        left:${Math.random()*100}vw;
        animation-duration:${10+Math.random()*8}s;
        animation-delay:${Math.random()*4}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 20000);
}
for (let k = 0; k < 10; k++) spawnPetal();
setInterval(spawnPetal, 3000);
</script>

</body>
</html>
